<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PAU Housing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div class="auth-page">
    <!-- Left panel with image -->
    <div class="auth-image-panel">
      <img src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=900&q=80" alt="Beautiful house"/>
      <div class="auth-image-overlay">
        <a href="index.html" class="auth-back">← Back to Home</a>
        <div class="auth-image-text">
          <h2>Welcome Back</h2>
          <p>Log in to access your dashboard and manage your housing experience.</p>
        </div>
      </div>
    </div>

    <!-- Right panel with form -->
    <div class="auth-form-panel">
      <div class="auth-card">
        <div class="auth-logo">
          <span>🏛</span>
          <p>PAU Housing System</p>
        </div>

        <!-- Role Tabs -->
        <div class="role-tabs">
          <button class="role-tab active" id="tabStudent" onclick="switchRole('student')">
            🎓 Student Login
          </button>
          <button class="role-tab" id="tabLandlord" onclick="switchRole('landlord')">
            🏠 Owner Login
          </button>
        </div>

        <div id="roleLabel" class="role-label">Signing in as a <strong>Student</strong></div>
        <input type="hidden" id="userRole" value="student"/>

        <div id="errorMsg" class="auth-error" style="display:none;"></div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter your email"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password"/>
        </div>

        <div class="form-row-between">
          <label class="checkbox-label">
            <input type="checkbox"/> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="btn-auth" onclick="handleLogin()">Sign In</button>

        <p class="auth-switch">
          Don't have an account?
          <a href="register.html" id="registerLink">Sign up here</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    function switchRole(role) {
      document.getElementById('userRole').value = role;
      document.getElementById('tabStudent').classList.toggle('active', role === 'student');
      document.getElementById('tabLandlord').classList.toggle('active', role === 'landlord');
      const label = document.getElementById('roleLabel');
      const regLink = document.getElementById('registerLink');
      if (role === 'student') {
        label.innerHTML = 'Signing in as a <strong>Student</strong>';
        regLink.href = 'register.html?role=student';
      } else {
        label.innerHTML = 'Signing in as a <strong>Property Owner</strong>';
        regLink.href = 'register.html?role=landlord';
      }
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('userRole').value;
      const errorMsg = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';
      if (!email || !password) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Please enter your email and password.';
        return;
      }

      try {
        const res  = await fetch('http://localhost:3000/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('pau_token', data.token);
          localStorage.setItem('pau_user', JSON.stringify(data.user));
          // Redirect based on role
          if (data.user.role === 'landlord') {
            window.location.href = 'owner-dashboard.html';
          } else {
            window.location.href = 'student-dashboard.html';
          }
        } else {
          errorMsg.style.display = 'block';
          errorMsg.textContent = data.error || 'Invalid email or password.';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Cannot connect to server. Make sure the backend is running.';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
